name: Build image and open staging GitOps PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_NAME: pipeline-demo
  IMAGE_NAME: ghcr.io/mint-cocoa/mintcocoa-pipeline-demo
  OPS_REPO: mint-cocoa/mintcocoa-ops

jobs:
  build-and-propose-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:${GITHUB_SHA}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "APP_VERSION=${GITHUB_SHA}" \
            --tag "$image" \
            --push \
            .
          echo "IMAGE=$image" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPS_REPO }}
          token: ${{ secrets.OPS_REPO_TOKEN }}
          path: mintcocoa-ops

      - name: Open staging overlay PR
        working-directory: mintcocoa-ops
        env:
          GH_TOKEN: ${{ secrets.OPS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          file="apps/${APP_NAME}/overlays/staging/kustomization.yaml"
          branch="staging/${APP_NAME}-${IMAGE_TAG}"

          sed -i "s|newName: .*|newName: ${IMAGE_NAME}|" "$file"
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|" "$file"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add "$file"

          if git diff --cached --quiet; then
            echo "staging overlay already uses ${IMAGE}; no PR needed."
            exit 0
          fi

          git commit -m "Update ${APP_NAME} staging image to ${IMAGE_TAG}"
          git push --force-with-lease origin "$branch"

          body="$(mktemp)"
          {
            echo "## Staging update"
            echo
            echo "Update \`${file}\` to \`${IMAGE}\`."
            echo
            echo "Merge this PR to let Argo CD auto-sync the home k3s staging overlay."
            echo
            echo "## Validation checklist"
            echo
            echo "- [ ] GitOps render validation is passing"
            echo "- [ ] No cluster credentials or secret values are included"
            echo "- [ ] Staging Argo CD will apply the merged desired state"
          } > "$body"

          pr_number="$(gh pr list --repo "$OPS_REPO" --head "$branch" --state open --json number --jq '.[0].number // empty')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$OPS_REPO" \
              --title "Update ${APP_NAME} staging image to ${IMAGE_TAG}" \
              --body-file "$body"
          else
            gh pr create \
              --repo "$OPS_REPO" \
              --base main \
              --head "$branch" \
              --title "Update ${APP_NAME} staging image to ${IMAGE_TAG}" \
              --body-file "$body"
          fi
